<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الهيكل الإداري</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">الشركة العالمية للأثاث المنزلي والمكتبي</p>
      <h1>الهيكل الإداري</h1>
      <p class="subtitle">عرض تفاعلي للموظفين حسب الأقسام مع توضيح التبعية الإدارية والمدير المباشر.</p>
    </div>
    <div class="hero-card">
      <span id="totalEmployees">0</span>
      <small>إجمالي الموظفين</small>
    </div>
  </header>

  <main class="app">
    <section class="toolbar">
      <div class="search-wrap">
        <span>⌕</span>
        <input id="searchInput" type="search" placeholder="ابحث عن موظف، منصب، مدير..." />
      </div>

      <select id="departmentFilter">
        <option value="">كل الأقسام</option>
      </select>

      <select id="branchFilter">
        <option value="">كل أماكن العمل</option>
      </select>

      <select id="managerFilter">
        <option value="">كل المدراء</option>
      </select>

      <button id="resetBtn">إعادة ضبط</button>
    </section>

    <section class="summary" id="summary"></section>

    <section id="departments" class="departments"></section>

    <section id="emptyState" class="empty hidden">
      لا توجد نتائج مطابقة للبحث الحالي.
    </section>
  </main>

  <template id="employeeTemplate">
    <article class="employee-card">
      <div class="avatar"></div>
      <div class="employee-info">
        <div class="name-row">
          <h3></h3>
          <span class="branch-badge"></span>
        </div>
        <p class="position"></p>
        <p class="manager-line"></p>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
